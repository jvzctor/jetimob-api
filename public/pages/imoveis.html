<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Todos os Imóveis</title>

    <link rel="stylesheet" href="../css/imoveis.css">

</head>

<body>

    <main class="container">

        <h1>Todos os Imóveis</h1>

        <p class="subtitulo">
            Encontre o imóvel ideal para você.
        </p>

        <!-- PESQUISA -->

        <div class="pesquisa">

            <input
                type="text"
                id="pesquisa"
                placeholder="Pesquisar por código, cidade, bairro ou título...">

        </div>

        <!-- FILTROS -->

        <div class="filtros">

            <select id="tipo">

                <option value="">Todos os tipos</option>

            </select>

            <select id="dormitorios">

                <option value="">Dormitórios</option>

                <option value="1">1+</option>

                <option value="2">2+</option>

                <option value="3">3+</option>

                <option value="4">4+</option>

            </select>

            <select id="ordenacao">

                <option value="recentes">Mais recentes</option>

                <option value="menor">Menor preço</option>

                <option value="maior">Maior preço</option>

                <option value="area">Maior área</option>

            </select>

        </div>

        <!-- CONTADOR -->

        <p id="contador">

            Carregando imóveis...

        </p>

        <!-- CARDS -->

        <div id="lista-imoveis">

        </div>

    </main>

    <script src="../js/imoveis.js"></script>

</body>

</html>
