<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Todos os Imóveis</title>

    <link rel="stylesheet" href="../css/imoveis.css">

</head>

<body>

<div class="container">

    <header>

        <h1>Todos os Imóveis</h1>

        <p>
            Encontre o imóvel ideal para você.
        </p>

    </header>

    <section class="busca">

        <input
            id="pesquisa"
            type="text"
            placeholder="Pesquisar por código, bairro, cidade ou imóvel...">

    </section>

    <section class="filtros">

        <select id="tipo">

            <option value="">Todos os tipos</option>

        </select>

        <select id="dormitorios">

            <option value="">Dormitórios</option>

            <option value="1">1+</option>

            <option value="2">2+</option>

            <option value="3">3+</option>

            <option value="4">4+</option>

        </select>

        <select id="ordenacao">

            <option value="recentes">

                Mais recentes

            </option>

            <option value="menor">

                Menor preço

            </option>

            <option value="maior">

                Maior preço

            </option>

            <option value="area">

                Maior área

            </option>

        </select>

    </section>

    <div class="topo-lista">

        <span id="contador">

            Carregando imóveis...

        </span>

    </div>

    <section
        id="lista-imoveis"
        class="grid">

    </section>

</div>

<script src="../js/imoveis.js"></script>

</body>

</html>
