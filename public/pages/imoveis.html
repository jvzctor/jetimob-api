<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Imóveis | Nil Imóveis</title>

     <meta
        name="description"
        content="Encontre casas, apartamentos, terrenos e imóveis para venda e locação na Serra Gaúcha com a Nil Imóveis. Atendimento personalizado e as melhores oportunidades da região.">

 <link
        rel="icon"
        type="image/png"
        href="../img/favicon.png">
        
    <link rel="stylesheet" href="../css/imoveis.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- HERO -->
    <!-- ===================================== -->

 <header class="header-nil">

    <div class="header-container">

        <a href="https://nilimoveis.imb.br">
            <img src="../img/logo-nil.png.png"
                 alt="Nil Imóveis"
                 class="logo-nil">
        </a>

        <a href="https://wa.me/5554997010512"
           target="_blank"
           class="btn-contato">
            Contato
        </a>

    </div>

</header>


    <!-- ===================================== -->
    <!-- CONTAINER -->
    <!-- ===================================== -->

    <main class="container-imoveis">


        <!-- ===================================== -->
        <!-- FILTROS -->
        <!-- ===================================== -->

        <section id="filtros" class="filtros">


            <div class="campo">

                <input

                    type="text"

                    id="pesquisa"

                    placeholder="Pesquisar por código, bairro, cidade ou imóvel">

            </div>


            <div class="campo">

                <select id="tipo">

                    <option value="">Todos os tipos</option>

                </select>

            </div>


            <div class="campo">

                <select id="cidade">

                    <option value="">Todas as cidades</option>

                </select>

            </div>


            <div class="campo">

                <select id="dormitorios">

                    <option value="">Dormitórios</option>

                    <option value="1">1+</option>

                    <option value="2">2+</option>

                    <option value="3">3+</option>

                    <option value="4">4+</option>

                    <option value="5">5+</option>

                </select>

            </div>


            <div class="campo">

                <select id="ordenacao">

                    <option value="">Ordenar</option>

                    <option value="menor">Menor preço</option>

                    <option value="maior">Maior preço</option>

                    <option value="area">Maior área</option>

                    <option value="recentes">Mais recentes</option>

                </select>

            </div>

        </section>


        <!-- ===================================== -->
        <!-- CONTADOR -->
        <!-- ===================================== -->

        <div id="contador" class="contador">

            Carregando imóveis...

        </div>


        <!-- ===================================== -->
        <!-- GRID -->
        <!-- ===================================== -->

        <section

            id="lista-imoveis"

            class="grid-imoveis">

        </section>

    </main>
        <!-- ===================================== -->
    <!-- RODAPÉ -->
    <!-- ===================================== -->

   <footer class="footer">
    <div class="footer-container">

        <h3>CONTATO</h3>

        <p>
            📍 R. Os Dezoito do Forte, 297 - Sala Térrea<br>
            Nossa Senhora de Lourdes<br>
            Caxias do Sul - RS, 95020-471
        </p>

        <p>
            📞 <a href="tel:+5554997010512">(54) 99701-0512</a>
        </p>

        <p>
            🕒 Segunda a Sexta • 08:00 às 18:18<br>
            (fecha ao meio-dia)
        </p>

        <hr>

        <p class="copyright">
            Copyright © Nil Imóveis – Todos os direitos reservados.
        </p>

    </div>
</footer>



    <!-- ===================================== -->
    <!-- LOADING -->
    <!-- ===================================== -->

    <div id="loading" class="loading" style="display:none;">

        <div class="spinner"></div>

    </div>



    <!-- ===================================== -->
    <!-- JAVASCRIPT -->
    <!-- ===================================== -->

    <script src="../js/imoveis.js"></script>

</body>

</html>
